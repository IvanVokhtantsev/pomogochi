<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Pomogochi favicon</title>
  <desc id="desc">A round red Pomogochi with bright highlights, tiny eyes, and a slightly unhappy mouth.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="92" x2="908" y2="934" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dbeafe" />
      <stop offset="0.52" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#ffe4e6" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="54%">
      <stop offset="0%" stop-color="#ff8b6a" stop-opacity="0.48" />
      <stop offset="52%" stop-color="#ff5b2b" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#ff5b2b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="body" x1="320" y1="262" x2="706" y2="798" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7758" />
      <stop offset="0.48" stop-color="#ff4d1a" />
      <stop offset="1" stop-color="#cb3000" />
    </linearGradient>
    <filter id="softShadow" x="124" y="126" width="782" height="782" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#0f172a" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)" />

  <g opacity="0.92">
    <circle cx="512" cy="548" r="286" fill="url(#glow)" />
  </g>

  <g filter="url(#softShadow)">
    <circle cx="512" cy="534" r="238" fill="url(#body)" />
    <ellipse cx="406" cy="392" rx="72" ry="100" transform="rotate(-30 406 392)" fill="#fff" opacity="0.24" />
    <ellipse cx="652" cy="392" rx="72" ry="100" transform="rotate(30 652 392)" fill="#fff" opacity="0.24" />

    <ellipse
      cx="512"
      cy="536"
      rx="284"
      ry="170"
      transform="rotate(24 512 536)"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.14"
      stroke-width="4"
    />

    <circle cx="446" cy="538" r="22" fill="#334155" />
    <circle cx="446" cy="538" r="10" fill="#111827" />
    <circle cx="580" cy="538" r="22" fill="#334155" />
    <circle cx="580" cy="538" r="10" fill="#111827" />

    <path
      d="M470 676c18-16 66-16 84 0"
      fill="none"
      stroke="#3b1419"
      stroke-linecap="round"
      stroke-width="10"
    />
  </g>
</svg>
