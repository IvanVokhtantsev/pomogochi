<svg xmlns="http://www.w3.org/2000/svg" width="720" height="404" viewBox="0 0 720 404" role="img" aria-labelledby="title desc">
  <title id="title">Pomogochi compact preview</title>
  <desc id="desc">A polished compact timer preview with time, Pomogochi, and a 3 by 3 control matrix.</desc>
  <defs>
    <linearGradient id="cardBg" x1="80" y1="78" x2="648" y2="328" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef6ff"/>
      <stop offset=".56" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ffe7f0"/>
    </linearGradient>
    <linearGradient id="pomBody" x1="176" y1="166" x2="226" y2="242" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7a63"/>
      <stop offset=".52" stop-color="#ff4d1a"/>
      <stop offset="1" stop-color="#cf2e00"/>
    </linearGradient>
    <filter id="windowShadow" x="12" y="8" width="696" height="388" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#0f172a" flood-opacity=".2"/>
    </filter>
  </defs>

  <g filter="url(#windowShadow)">
    <rect x="28" y="22" width="664" height="356" rx="30" fill="url(#cardBg)" stroke="rgba(255,255,255,.72)"/>
  </g>

  <rect x="28" y="22" width="664" height="54" rx="30" fill="#0f172a" fill-opacity=".92"/>
  <rect x="28" y="46" width="664" height="332" rx="0 0 30 30" fill="transparent"/>
  <circle cx="62" cy="49" r="10" fill="#ff5f57"/>
  <circle cx="90" cy="49" r="10" fill="#ffbd2e"/>
  <circle cx="118" cy="49" r="10" fill="#28c840"/>
  <text x="160" y="56" fill="rgba(255,255,255,.76)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="760">24:47 • Compact</text>

  <text x="78" y="152" fill="rgba(71,85,105,.75)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" letter-spacing="6">POMOGOCHI</text>
  <text x="78" y="196" fill="#0f172a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" letter-spacing="-2">Short</text>
  <text x="78" y="246" fill="#0f172a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" letter-spacing="-2">break</text>

  <g>
    <circle cx="206" cy="178" r="20" fill="url(#pomBody)"/>
    <ellipse cx="198" cy="168" rx="5" ry="8" transform="rotate(-25 198 168)" fill="rgba(255,255,255,.22)"/>
    <ellipse cx="214" cy="168" rx="5" ry="8" transform="rotate(25 214 168)" fill="rgba(255,255,255,.22)"/>
    <circle cx="200" cy="182" r="3.8" fill="#111827"/>
    <circle cx="212" cy="182" r="3.8" fill="#111827"/>
    <path d="M200 192q6 5 12 0" fill="none" stroke="#3b1419" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <text x="72" y="336" fill="#0f172a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="112" font-weight="800" letter-spacing="-8">05:00</text>

  <g transform="translate(502 140)">
    <g>
      <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,.56)" stroke="rgba(255,255,255,.72)"/>
      <text x="0" y="7" text-anchor="middle" fill="#1e293b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="780">II</text>
    </g>
    <g transform="translate(50 0)">
      <text x="0" y="7" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="780">8</text>
    </g>
    <g transform="translate(100 0)">
      <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,.56)" stroke="rgba(255,255,255,.72)"/>
      <text x="0" y="7" text-anchor="middle" fill="#1e293b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="780">↗</text>
    </g>

    <g transform="translate(0 50)">
      <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,.56)" stroke="rgba(255,255,255,.72)"/>
      <text x="0" y="7" text-anchor="middle" fill="#1e293b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="780">F</text>
    </g>
    <g transform="translate(50 50)">
      <circle cx="0" cy="0" r="20" fill="#f43f5e"/>
      <text x="0" y="7" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="780">S</text>
    </g>
    <g transform="translate(100 50)">
      <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,.56)" stroke="rgba(255,255,255,.72)"/>
      <text x="0" y="7" text-anchor="middle" fill="#1e293b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="780">L</text>
    </g>

    <g transform="translate(0 100)">
      <circle cx="0" cy="0" r="20" fill="#f43f5e"/>
      <text x="0" y="7" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="780">▶</text>
    </g>
    <g transform="translate(50 100)">
      <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,.56)" stroke="rgba(255,255,255,.72)"/>
      <text x="0" y="7" text-anchor="middle" fill="#1e293b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="780">↺</text>
    </g>
    <g transform="translate(100 100)">
      <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,.56)" stroke="rgba(255,255,255,.72)"/>
      <text x="0" y="7" text-anchor="middle" fill="#1e293b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="780">»</text>
    </g>
  </g>
</svg>
