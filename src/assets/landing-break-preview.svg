<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760" role="img" aria-labelledby="title desc">
  <title id="title">Pomogochi break preview</title>
  <desc id="desc">A polished break screen preview with Pomogochi, countdown, and skip button.</desc>
  <defs>
    <linearGradient id="bg" x1="100" y1="82" x2="876" y2="676" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13243d"/>
      <stop offset="0.55" stop-color="#212b42"/>
      <stop offset="1" stop-color="#2b243d"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(214 164) rotate(57.8) scale(284 362)">
      <stop stop-color="#38bdf8" stop-opacity=".18"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(718 160) rotate(90) scale(248 224)">
      <stop stop-color="#f43f5e" stop-opacity=".18"/>
      <stop offset="1" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="groundGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(578 616) rotate(90) scale(160 214)">
      <stop stop-color="#14b8a6" stop-opacity=".18"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pomBody" x1="432" y1="188" x2="700" y2="564" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7a63"/>
      <stop offset=".52" stop-color="#ff4d1a"/>
      <stop offset="1" stop-color="#cf2e00"/>
    </linearGradient>
    <filter id="cardShadow" x="44" y="30" width="872" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity=".24"/>
    </filter>
    <filter id="pomShadow" x="358" y="138" width="420" height="492" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#ff5b2b" flood-opacity=".28"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="72" y="54" width="816" height="652" rx="42" fill="url(#bg)"/>
    <rect x="96" y="78" width="768" height="604" rx="34" fill="none" stroke="rgba(255,255,255,.14)"/>
  </g>

  <rect x="72" y="54" width="816" height="652" rx="42" fill="url(#glowLeft)"/>
  <rect x="72" y="54" width="816" height="652" rx="42" fill="url(#glowRight)"/>
  <rect x="72" y="54" width="816" height="652" rx="42" fill="url(#groundGlow)"/>

  <text x="140" y="140" fill="#cbd5e1" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800" letter-spacing="7">POMOGOCHI BREAK</text>

  <text x="140" y="236" fill="#f8fafc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="800" letter-spacing="-5">Pomogochi</text>
  <text x="140" y="316" fill="#f8fafc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="800" letter-spacing="-5">needs a break</text>

  <text x="140" y="394" fill="rgba(226,232,240,.82)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600">Look away, stretch your shoulders,</text>
  <text x="140" y="430" fill="rgba(226,232,240,.82)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600">and let your brain breathe.</text>

  <g>
    <rect x="140" y="492" width="280" height="148" rx="30" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.16)"/>
    <text x="172" y="538" fill="rgba(226,232,240,.72)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" letter-spacing="3">REMAINING</text>
    <text x="170" y="622" fill="#f8fafc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="92" font-weight="800" letter-spacing="-6">04:39</text>
  </g>

  <text x="140" y="676" fill="rgba(203,213,225,.68)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600">The next focus cycle starts automatically.</text>

  <g filter="url(#pomShadow)">
    <ellipse cx="584" cy="382" rx="154" ry="176" fill="url(#pomBody)"/>
    <ellipse cx="516" cy="274" rx="44" ry="64" transform="rotate(-28 516 274)" fill="rgba(255,255,255,.24)"/>
    <ellipse cx="654" cy="274" rx="44" ry="64" transform="rotate(28 654 274)" fill="rgba(255,255,255,.24)"/>
    <ellipse cx="584" cy="382" rx="206" ry="118" transform="rotate(18 584 382)" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="3"/>
    <ellipse cx="596" cy="390" rx="190" ry="132" transform="rotate(-12 596 390)" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
    <g>
      <circle cx="542" cy="386" r="16" fill="#111827"/>
      <circle cx="626" cy="386" r="16" fill="#111827"/>
      <circle cx="542" cy="386" r="9" fill="rgba(255,255,255,.22)"/>
      <circle cx="626" cy="386" r="9" fill="rgba(255,255,255,.22)"/>
      <path d="M540 466q44 26 88 0" fill="none" stroke="#3b1419" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>

  <g>
    <rect x="668" y="628" width="156" height="54" rx="27" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)"/>
    <text x="746" y="662" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="760">Skip break</text>
  </g>
</svg>
