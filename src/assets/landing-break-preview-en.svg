<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760" role="img" aria-labelledby="title desc">
  <title id="title">Pomogochi break preview English</title>
  <desc id="desc">English promo screenshot for the Pomogochi break screen.</desc>
  <defs>
    <linearGradient id="bg" x1="100" y1="82" x2="876" y2="676" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17314d"/>
      <stop offset="0.56" stop-color="#1b263d"/>
      <stop offset="1" stop-color="#2c253c"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(196 170) rotate(60) scale(290 360)">
      <stop stop-color="#38bdf8" stop-opacity=".16"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(726 164) rotate(90) scale(244 222)">
      <stop stop-color="#f43f5e" stop-opacity=".16"/>
      <stop offset="1" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="groundGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(544 612) rotate(90) scale(166 220)">
      <stop stop-color="#14b8a6" stop-opacity=".12"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pomBody" x1="404" y1="206" x2="676" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7a63"/>
      <stop offset=".48" stop-color="#ff4d1a"/>
      <stop offset="1" stop-color="#cf2e00"/>
    </linearGradient>
    <filter id="cardShadow" x="44" y="30" width="872" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity=".24"/>
    </filter>
    <filter id="pomShadow" x="348" y="156" width="438" height="476" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="32" stdDeviation="28" flood-color="#ff5b2b" flood-opacity=".24"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="72" y="54" width="816" height="652" rx="42" fill="url(#bg)"/>
    <rect x="96" y="78" width="768" height="604" rx="34" fill="none" stroke="rgba(255,255,255,.14)"/>
  </g>

  <rect x="72" y="54" width="816" height="652" rx="42" fill="url(#glowLeft)"/>
  <rect x="72" y="54" width="816" height="652" rx="42" fill="url(#glowRight)"/>
  <rect x="72" y="54" width="816" height="652" rx="42" fill="url(#groundGlow)"/>

  <text x="138" y="140" fill="#cbd5e1" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800" letter-spacing="7">POMOGOCHI BREAK</text>

  <text x="138" y="236" fill="#f8fafc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="800" letter-spacing="-5">Pomogochi</text>
  <text x="138" y="316" fill="#f8fafc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="800" letter-spacing="-5">wants 5</text>
  <text x="138" y="396" fill="#f8fafc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="800" letter-spacing="-5">minutes</text>

  <text x="138" y="472" fill="rgba(226,232,240,.82)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="600">Look away, stretch your shoulders,</text>
  <text x="138" y="508" fill="rgba(226,232,240,.82)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="600">and let your brain breathe.</text>

  <g>
    <rect x="138" y="560" width="282" height="142" rx="28" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.16)"/>
    <text x="170" y="602" fill="rgba(226,232,240,.72)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800" letter-spacing="3">REMAINING</text>
    <text x="166" y="686" fill="#f8fafc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="92" font-weight="800" letter-spacing="-6">03:55</text>
  </g>

  <text x="138" y="734" fill="rgba(203,213,225,.68)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600">When the break ends, the next focus cycle starts</text>
  <text x="138" y="760" fill="rgba(203,213,225,.68)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600">automatically.</text>

  <g filter="url(#pomShadow)">
    <ellipse cx="602" cy="430" rx="160" ry="178" fill="url(#pomBody)"/>
    <ellipse cx="520" cy="334" rx="42" ry="58" transform="rotate(-28 520 334)" fill="rgba(255,255,255,.24)"/>
    <ellipse cx="684" cy="334" rx="42" ry="58" transform="rotate(28 684 334)" fill="rgba(255,255,255,.24)"/>
    <ellipse cx="606" cy="434" rx="210" ry="122" transform="rotate(18 606 434)" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="3"/>
    <ellipse cx="614" cy="438" rx="188" ry="136" transform="rotate(-12 614 438)" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
    <circle cx="562" cy="454" r="15" fill="#334155"/>
    <circle cx="648" cy="454" r="15" fill="#334155"/>
    <circle cx="562" cy="454" r="8" fill="#111827"/>
    <circle cx="648" cy="454" r="8" fill="#111827"/>
    <path d="M580 538q30-24 60 0" fill="none" stroke="#3b1419" stroke-width="9" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="682" y="650" width="148" height="52" rx="26" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)"/>
    <text x="756" y="683" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="760">Skip break</text>
  </g>
</svg>
